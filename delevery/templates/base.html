<!DOCTYPE html>
<html>
<head>

    <title>Django Project</title>

    <style>

        body{
            font-family: Arial;
            margin: 0;
            background: #f4f4f4;
        }

        .navbar{
            background: #333;
            padding: 15px;
        }

        .navbar a{
            color: white;
            text-decoration: none;
            margin-right: 15px;
            font-weight: bold;
        }

        .container{
            padding: 20px;
        }

        button.logout-btn{
            background: none;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-left: 10px;
        }

        .user-info{
            color: #fff;
            margin-right: 15px;
            font-weight: bold;
        }

    </style>

</head>

<body>

    <div class="navbar">

        <a href="{% url 'home' %}">
            Home
        </a>

        {% if user.is_authenticated %}

            <!-- 👤 اسم المستخدم -->
            <span class="user-info">
                Hello, {{ user.username }}
            </span>

            <!-- 🧑‍💼 Staff + Admin فقط يشوف Add -->
            {% if user.is_staff or user.is_superuser %}
                <a href="{% url 'add_delivery' %}">
                    Add Delivery
                </a>
            {% endif %}

            <!-- 🚪 Logout (POST آمن) -->
            <form method="post" action="{% url 'logout' %}" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="logout-btn">
                    Logout
                </button>
            </form>

        {% else %}

            <a href="{% url 'login' %}">
                Login
            </a>

        {% endif %}

    </div>

    <div class="container">

        {% block content %}
        {% endblock %}

    </div>

</body>
</html>
